name: Daily AI Digest

on:
  schedule:
    # 每天 06:00 北京时间 (22:00 UTC)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx feedparser beautifulsoup4 lxml pyyaml pydantic pydantic-settings openai click
          pip install sentence-transformers numpy

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python -m src.main

      - name: Commit articles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@ai-news.local"
          git add ../blog/content/articles/
          git diff --staged --quiet || git commit -m "chore: daily AI digest $(date +'%Y-%m-%d')"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/leewaysv/ai-news.git
          git push

  deploy:
    needs: digest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: hugo --gc --minify

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy public \
            --project-name=ai-news \
            --branch=master
