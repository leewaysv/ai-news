name: Daily AI Digest

on:
  schedule:
    # 每天 06:00 北京时间 (22:00 UTC)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx feedparser beautifulsoup4 lxml pyyaml pydantic pydantic-settings anthropic click
          # sentence-transformers 可选，无 embedding 模型时 QA 检查默认通过
          pip install sentence-transformers numpy

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main

      - name: Commit articles
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@ai-news.local"
          git add ../blog/content/articles/
          git diff --staged --quiet || git commit -m "chore: daily AI digest $(date +'%Y-%m-%d')"
          git push
