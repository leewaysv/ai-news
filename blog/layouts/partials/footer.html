<footer class="border-t border-gray-200 dark:border-gray-800 mt-auto">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex flex-col items-center gap-4 text-sm text-gray-500 dark:text-gray-400">
      <div class="flex items-center gap-4">
        {{- range .Site.Params.social }}
          {{- if eq .name "rss" }}
            <a href="{{ .url }}" class="hover:text-orange-500 transition-colors" title="RSS 订阅">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M6.18 15.64a2.18 2.18 0 010 4.36 2.18 2.18 0 010-4.36M4 4.44A15.56 15.56 0 0119.56 20h-2.83A12.73 12.73 0 004 7.27V4.44m0 5.66a9.9 9.9 0 019.9 9.9h-2.83A7.07 7.07 0 004 12.93v-2.83z"/>
              </svg>
            </a>
          {{- end }}
        {{- end }}
      </div>
      <div>
        <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.</p>
      </div>
    </div>
  </div>
</footer>
