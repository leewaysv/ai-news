<header class="sticky top-0 z-50 bg-white/70 dark:bg-gray-950/70 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-800/50">
  <nav class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="{{ .Site.Home.RelPermalink }}" class="flex items-center gap-2 text-xl font-bold text-gray-900 dark:text-white tracking-tight hover:text-blue-600 dark:hover:text-blue-400 transition-colors no-underline">
      {{ .Site.Title }}
    </a>

    <div class="flex items-center gap-5">
      {{- $currentPage := . }}
      {{- range .Site.Menus.main }}
        <a href="{{ .URL }}"
           class="text-sm font-medium transition-colors no-underline
                  {{ if $currentPage.IsMenuCurrent "main" . }}
                    text-blue-600 dark:text-blue-400
                  {{ else }}
                    text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100
                  {{ end }}">
          {{ .Name }}
        </a>
      {{- end }}

      <button id="theme-toggle" class="theme-toggle" aria-label="切换暗色模式">
        <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg id="moon-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </div>
  </nav>
</header>
