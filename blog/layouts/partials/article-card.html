<article class="article-card">
  <div class="flex flex-col gap-3">
    <!-- 标题 -->
    <h3 class="article-card-title">
      <a href="{{ .RelPermalink }}" class="no-underline">
        {{ .Title }}
      </a>
    </h3>

    <!-- 摘要 -->
    {{- with .Params.summary }}
      <p class="text-sm text-gray-500 dark:text-gray-400 leading-relaxed line-clamp-2">{{ . }}</p>
    {{- end }}

    <!-- 元信息栏 -->
    <div class="flex flex-wrap items-center gap-2.5 mt-1">
      {{- with .Params.source }}
        <span class="source-badge">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
            <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
          </svg>
          {{ . }}
        </span>
      {{- end }}

      <span class="text-xs text-gray-400 dark:text-gray-500">
        {{ .Date.Format "15:04" }}
      </span>

      {{- if .Params.aigc }}
        <span class="tag-aigc">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          AI 辅助
        </span>
      {{- end }}

      {{- range .Params.categories }}
        <a href="{{ "/categories/" | relURL }}{{ . | urlize }}" class="tag">
          {{ . }}
        </a>
      {{- end }}
    </div>
  </div>
</article>
