{{ define "main" }}
<div class="space-y-8">
  <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
    {{ .Title }}
  </h1>

  {{- with .Content }}
    <div class="article-content">{{ . }}</div>
  {{- end }}

  <div class="space-y-3">
    {{- range .Paginator.Pages }}
      {{ partial "article-card.html" . }}
    {{- end }}
  </div>

  {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
