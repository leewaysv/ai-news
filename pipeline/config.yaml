# ============================================================
# AI News Pipeline 配置
# ============================================================

# ------ 模型配置 ------
llm:
  provider: "openai"                     # openai | anthropic
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"   # OpenAI 兼容接口地址
  model: "deepseek-chat"                 # 摘要用模型
  cheap_model: "deepseek-chat"           # 预过滤用模型
  max_tokens: 4096

embedding:
  model: "all-MiniLM-L6-v2"
  threshold: 0.75

# ------ 管道配置 ------
pipeline:
  timezone: "Asia/Shanghai"
  output_dir: "../blog/content/articles"
  max_articles_per_digest: 8
  min_articles_to_publish: 3
  source_weights:
    openai-blog: 10
    google-ai: 9
    meta-ai: 9
    deepmind: 9
    anthropic: 9
    techcrunch-ai: 7
    theverge-ai: 7
    mit-news: 8
    huggingface: 8
    hackernews: 6
    github-trending: 6
    36kr-ai: 9
    infoq-cn: 9
    liangzita: 9
    default: 5

# ------ 平台发布配置 ------
platforms:
  blog:
    enabled: true
  wechat:
    enabled: false
  douyin:
    enabled: false

# ------ 新闻源 ------
news_sources:
  - id: openai-blog
    name: "OpenAI Blog"
    type: rss
    url: "https://openai.com/blog/rss.xml"
    lang: en
    categories: ["llm", "research"]

  - id: google-ai
    name: "Google AI Blog"
    type: rss
    url: "https://blog.research.google/atom.xml"
    lang: en
    categories: ["research", "ml"]

  - id: meta-ai
    name: "Meta AI"
    type: rss
    url: "https://ai.meta.com/blog/rss/"
    lang: en
    categories: ["research", "llm"]

  - id: deepmind
    name: "DeepMind"
    type: rss
    url: "https://deepmind.google/blog/rss.xml"
    lang: en
    categories: ["research", "ml"]

  - id: anthropic
    name: "Anthropic"
    type: rss
    url: "https://www.anthropic.com/feed.xml"
    lang: en
    categories: ["llm", "research", "safety"]

  - id: huggingface
    name: "Hugging Face Blog"
    type: rss
    url: "https://huggingface.co/blog/feed.xml"
    lang: en
    categories: ["open-source", "ml"]

  - id: mit-news
    name: "MIT News AI"
    type: rss
    url: "https://news.mit.edu/topic/artificial-intelligence2/rss"
    lang: en
    categories: ["research", "education"]

  - id: techcrunch-ai
    name: "TechCrunch AI"
    type: rss
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    lang: en
    categories: ["industry", "startup"]

  - id: theverge-ai
    name: "The Verge AI"
    type: rss
    url: "https://www.theverge.com/ai-artificial-intelligence/rss"
    lang: en
    categories: ["industry", "policy"]

  - id: hackernews
    name: "Hacker News"
    type: api
    url: "https://hacker-news.firebaseio.com/v0/topstories.json"
    lang: en
    categories: ["community", "tech"]

  - id: github-trending
    name: "GitHub Trending"
    type: api
    url: "https://api.github.com/search/repositories?q=topic:ai+sort:stars&per_page=20"
    lang: en
    categories: ["open-source", "tools"]

  - id: liangzita
    name: "量子位"
    type: scrape
    url: "https://www.qbitai.com/"
    lang: zh
    categories: ["industry", "tools"]

  - id: 36kr-ai
    name: "36氪 AI"
    type: rss
    url: "https://36kr.com/feed"
    lang: zh
    categories: ["industry", "startup"]

  - id: infoq-cn
    name: "InfoQ AI"
    type: rss
    url: "https://www.infoq.cn/feed"
    lang: zh
    categories: ["industry", "engineering"]
